{{ $rating := float . }}
{{ $ratingHalfUnits := int (math.Round (mul $rating 2)) }}

<div class="stars">
  {{ range seq 1 5 }}
    {{ $star := . }}
    {{ $starFullUnits := mul $star 2 }}
    {{ $starHalfUnits := sub $starFullUnits 1 }}

    {{ $id := printf "rating-star-%d-%d" $star $ratingHalfUnits }}

    <svg class="rating-star" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <clipPath id="{{ $id }}-left" clipPathUnits="userSpaceOnUse">
          <path d="M0 0h50v100H0z"/>
        </clipPath>

        <clipPath id="{{ $id }}-right" clipPathUnits="userSpaceOnUse">
          <path d="M50 0h50v100H50z"/>
        </clipPath>

        <path
          id="{{ $id }}-shape"
          d="m93.516 36.188-29.914-.555-9.77-28.277c-1.257-3.636-6.402-3.636-7.66 0l-9.77 28.281-29.913.555c-3.852.07-5.442 4.965-2.367 7.285l23.875 18.031-8.72 28.621c-1.12 3.684 3.044 6.707 6.2 4.504l24.527-17.137 24.527 17.137c3.156 2.203 7.32-.82 6.2-4.504l-8.72-28.62 23.875-18.032c3.07-2.32 1.48-7.215-2.367-7.285z"
          transform="translate(5 5.8)scale(.899)"
        />
      </defs>

      {{ if ge $ratingHalfUnits $starFullUnits }}
        <!-- Full star: draw once, no clipped halves, no seam -->
        <use href="#{{ $id }}-shape" fill="var(--darkcolor)"/>

      {{ else if eq $ratingHalfUnits $starHalfUnits }}
        <!-- Half star: split left/right -->
        <use href="#{{ $id }}-shape" clip-path="url(#{{ $id }}-left)" fill="var(--darkcolor)"/>
        <use href="#{{ $id }}-shape" clip-path="url(#{{ $id }}-right)" fill="var(--theme)"/>

      {{ else }}
        <!-- Empty star -->
        <use href="#{{ $id }}-shape" fill="var(--theme)"/>
      {{ end }}

      <use href="#{{ $id }}-shape" fill="none" stroke="var(--primary)" stroke-width="6" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
    </svg>
  {{ end }}
</div>
