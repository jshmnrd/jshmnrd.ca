{{ define "main" }}
<main class="main">
  <article class="post-single">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
    </header>

    <div class="post-content">
      <ul>
        {{ range site.RegularPages.ByTitle }}
          {{ if not .Params.hideFromSitemap }}
            <li>
              <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            </li>
          {{ end }}
        {{ end }}
      </ul>
    </div>
  </article>
</main>
{{ end }}
