{{ define "main" }}
<main class="main">
  <article class="post-single">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
    </header>

    <div class="post-content">
      {{ range site.Sections.ByTitle }}
        <h2>{{ .Title }}</h2>

        <ul>
          {{ range .RegularPages.ByTitle }}
            {{ if not .Params.hideFromSitemap }}
              <li>
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
              </li>
            {{ end }}
          {{ end }}
        </ul>
      {{ end }}
    </div>
  </article>
</main>
{{ end }}
