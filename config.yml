baseURL: "https://jshmnrd.ca" 
title: Joshua Maynard
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
    tag: tags

menu:
    main:
        - name: about
          url: about/
          weight: 2 
        - name: blog
          url: blog/
          weight: 3
        - name: explore
          url: explore/
          weight: 4
        - name: archive
          url: archives/
          weight: 5
        - name: tags
          url: tags/
          weight: 6
        - name: contact
          url: contact/
          weight: 9
        - name: 🔍
          url:  search/
          weight: 10

params:
    description: "This is my personal website, where I keep pretty much whatever I want myself or others to be able to access freely."
    author: Joshua Maynard
    # googleAnalyticsID: "G-XXXXX"
    DateFormat: "2006-01-02"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: true
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowRssButtonInSectionTermList: true
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: true
    MainSections: ["about","blog","explore","contact"]
    ShowToc: false
    disableScrollToTop: false
    TocOpen: false
    ShowWordCount: false
    # UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Joshua Maynard
          subtitle: "I'm a geek from Toronto, Canada. I love movies, TV, D&D and pretty much anything computer-related. Be sure to pet the bird & enjoy 😊"
          imageUrl: "jm-transparent.PNG"
          imageWidth: 160
          imageHeight: 160
          buttons:
              - name: about
                url: about/
              - name: blog
                url: blog/
              - name: explore
                url: explore/
              - name: contact
                url: contact/
              #- name: rss
                #url: https://jshmnrd.ca/index.xml

    socialIcons:
        - name: Twitter
          url: https://twitter.com/bigMoosse/
        - name: Bluesky
          url: https://bsky.app/profile/jshmnrd.ca/
        - name: Mastodon
          url: https://mstdn.ca/@jshmnrd/
        - name: Letterboxd
          url: https://letterboxd.com/jshmnrd/
        - name: Hardcover
          url: https://hardcover.app/@jshmnrd?referrer_id=98561
        - name: Musicboard
          url: https://musicboard.app/jshmnrd
        #- name: Anilist
          #url: https://anilist.co/user/joshuamaynard/
        - name: GitHub
          url: https://github.com/jshmnrd/
        #- name: RSS
          #url: https://jshmnrd.ca/index.xml

    assets:
        disableScrollBarStyle: true
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "Joshua Maynard"
      icon: "favicon.ico"
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn 
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search