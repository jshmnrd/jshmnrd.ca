    socialIcons:
        - name: Twitter
          url: https://twitter.com/bigMoosse/
        - name: Bluesky
          url: https://bsky.app/profile/jshmnrd.ca/
        - name: Mastodon
          url: https://mstdn.ca/@jshmnrd/
        - name: LinkedIn
          url: https://www.linkedin.com/in/maynardjoshua/
        # - name: spacer
        - name: Letterboxd
          url: https://letterboxd.com/jshmnrd/
        - name: Anilist
